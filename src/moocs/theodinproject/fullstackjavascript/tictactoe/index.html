<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
<div id="wrapper-all"> <!-- start wrapper -->

    <div id="header">
        <h1>Tic Tac Toe</h1>
    </div>

    <div id="main">
        <div id ="status"></div>
        <div id="board">
            <div class="grid-item" id="i0"></div>
            <div class="grid-item" id="i1"></div>
            <div class="grid-item" id="i2"></div>
            <div class="grid-item" id="i3"></div>
            <div class="grid-item" id="i4"></div>
            <div class="grid-item" id="i5"></div>
            <div class="grid-item" id="i6"></div>
            <div class="grid-item" id="i7"></div>
            <div class="grid-item" id="i8"></div>
        </div>
        <div id ="reset">
            <button id="reset-button" type="button">Reset</button>
        </div>
    </div>

    <div id="footer">
        <h1>Copyright © The Odin Project 2021</h1>
    </div>

</div> <!-- end wrapper -->
</body>
</html>
